<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Journey Across | Login</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Montserrat:wght@300;400;600&display=swap"
        rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            color: white;
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Background */
        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                linear-gradient(rgba(0, 0, 0, .55),
                    rgba(0, 0, 0, .7)),
                url('https://images.unsplash.com/photo-1436491865332-7a61a109cc05?q=80&w=2074&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            filter: blur(2px);
            transform: scale(1.1);
            z-index: -2;
        }

        /* Glow */
        body::after {
            content: '';
            position: absolute;
            width: 700px;
            height: 700px;
            background:
                radial-gradient(circle,
                    rgba(244, 208, 104, .08),
                    transparent 70%);
            top: -200px;
            left: -100px;
            filter: blur(60px);
            z-index: -1;
        }

        /* Center section */
        .hero-section {
            width: 100%;
            height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        /* Content Box */
        .content {
            width: 100%;
            max-width: 550px;

            background: rgba(5, 5, 5, .35);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);

            border: 1px solid rgba(255, 255, 255, .08);
            border-radius: 24px;

            padding: 50px 40px;

            box-shadow:
                0 20px 40px rgba(0, 0, 0, .45),
                0 0 20px rgba(255, 255, 255, .03);

            animation: fadeIn 1.2s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(50px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .subtitle {
            color: #f4d068;
            font-size: .75rem;
            letter-spacing: .35em;
            text-transform: uppercase;
            margin-bottom: 15px;
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: 3rem;
            margin-bottom: 15px;
            font-weight: 400;
        }

        .description {
            color: rgba(255, 255, 255, .7);
            margin-bottom: 35px;
            font-size: 1rem;
        }

        /* Login Card */
        .login-card {
            width: 100%;
            max-width: 380px;
            margin: auto;

            background: rgba(255, 255, 255, .03);
            border: 1px solid rgba(255, 255, 255, .08);

            border-radius: 28px;
            padding: 2rem;
        }

        /* Form styling to stack elements neatly */
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Inputs */
        .login-input {
            width: 100%;
            height: 54px;

            background: rgba(255, 255, 255, .05);
            border: 1px solid rgba(255, 255, 255, .08);

            border-radius: 14px;
            outline: none;

            color: white;
            padding: 0 18px;
            font-size: .95rem;

            transition: .3s;
        }

        .login-input:focus {
            border-color: #f4d068;
            box-shadow: 0 0 20px rgba(244, 208, 104, .08);
        }

        .login-input::placeholder {
            color: rgba(255, 255, 255, .35);
        }

        /* Login Button */
        .login-btn {
            width: 100%;
            height: 54px;
            margin-top: 8px;

            border: none;
            border-radius: 14px;

            background: #f5f2ea;
            color: #111;

            font-weight: 600;
            font-size: .95rem;

            cursor: pointer;
            transition: .3s;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            background: white;
        }

        /* Responsive */
        @media(max-width:768px) {

            .content {
                padding: 35px 20px;
            }

            h1 {
                font-size: 2.2rem;
            }

            .login-card {
                padding: 1.5rem;
            }
        }
    </style>
</head>

<body>

    <section class="hero-section">

        <div class="content">

            <p class="subtitle">
                START YOUR JOURNEY
            </p>

            <h1>
                WHERE NEXT?
            </h1>

            <p class="description">
                Log in to start your journey now
            </p>

            <div class="login-card">

                <form class="login-form" id="loginForm">

                    <input type="email" class="login-input" id="email" placeholder="Enter your email" required>

                    <input type="password" class="login-input" id="password" placeholder="Enter your password" required>

                    <button type="submit" class="login-btn">
                        Log In
                    </button>

                </form>

            </div>

        </div>

    </section>

    <script>
        // Redirect to index.html if already logged in
        if (localStorage.getItem('isLoggedIn')) {
            window.location.replace('index.html');
        }

        // Handle form authentication simulation
        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault(); // Stop page refresh

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Simple client-side check just to test functionality
            if (email && password) {
                localStorage.setItem('isLoggedIn', 'true');
                window.location.replace('index.html');
            }
        });

        // Handle Google Login redirect
        document.getElementById('googleLogin').addEventListener('click', () => {
            window.location.href = "https://accounts.google.com/AccountChooser";
        });
    </script>
</body>

</html>
